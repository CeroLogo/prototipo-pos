<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema POS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; }
.sidebar {
  height:100vh;
  background:#343a40;
  color:white;
  padding:20px;
}
.sidebar button {
  width:100%;
  margin-bottom:10px;
}
.section { display:none; }
.active { display:block; }
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-2 sidebar">
  <h4>POS</h4>
  <button class="btn btn-light" onclick="show('dashboard')">Dashboard</button>
  <button class="btn btn-light" onclick="show('inventory')">Inventario</button>
  <button class="btn btn-light" onclick="show('sales')">Ventas</button>
  <button class="btn btn-light" onclick="show('reports')">Reportes</button>
</div>

<!-- CONTENT -->
<div class="col-10 p-4">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
  <h2>Dashboard</h2>
  <p>Total ventas: <span id="totalSales">0</span></p>
  <p>Productos: <span id="totalProducts">0</span></p>
</div>

<!-- INVENTARIO -->
<div id="inventory" class="section">
  <h2>Inventario</h2>

  <input id="name" placeholder="Producto" class="form-control mb-2">
  <input id="price" placeholder="Precio" class="form-control mb-2">
  <input id="stock" placeholder="Stock" class="form-control mb-2">

  <button class="btn btn-success mb-3" onclick="addProduct()">Agregar</button>

  <table class="table table-bordered">
    <thead>
      <tr><th>Nombre</th><th>Precio</th><th>Stock</th></tr>
    </thead>
    <tbody id="productTable"></tbody>
  </table>
</div>

<!-- VENTAS -->
<div id="sales" class="section">
  <h2>Ventas</h2>

  <select id="productSelect" class="form-control mb-2"></select>
  <input id="qty" placeholder="Cantidad" class="form-control mb-2">

  <button class="btn btn-primary" onclick="sell()">Vender</button>

  <p class="mt-3">Total: $<span id="saleTotal">0</span></p>
</div>

<!-- REPORTES -->
<div id="reports" class="section">
  <h2>Reportes</h2>

  <ul id="salesList"></ul>
</div>

</div>
</div>
</div>

<script src="app.js"></script>

</body>
</html>
